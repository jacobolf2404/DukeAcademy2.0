services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dukeacademy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dukeacademy316}
      POSTGRES_DB: ${POSTGRES_DB:-dukeacademy2}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dukeacademy -d dukeacademy2"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dukeacademy}:${POSTGRES_PASSWORD:-dukeacademy316}@db:5432/${POSTGRES_DB:-dukeacademy2}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FLASK_ENV: ${FLASK_ENV:-development}
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

volumes:
  pgdata:
